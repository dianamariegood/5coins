<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>5 Coins of Wisdom — Coin Unlock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=Cormorant+Infant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight-navy: #09111B;
    --storm-blue: #31567A;
    --teal: #0E9ACB;
    --gold: #C9991A;
    --gold-light: #E8B84B;
    --gold-pale: #F5D98E;
    --text-primary: #E8DFC8;
    --text-secondary: #8A9BB0;
    --text-dim: #4A6070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--midnight-navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* Star field background */
  .star-field {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--max-opacity, 0.4); }
  }

  /* Radial glow behind coin */
  .coin-glow-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(14, 154, 203, 0.08) 0%, rgba(201, 153, 26, 0.06) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .coin-glow-bg.visible {
    opacity: 1;
  }

  /* Phone shell */
  .phone {
    position: relative;
    width: 375px;
    min-height: 812px;
    background: var(--midnight-navy);
    border-radius: 44px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 40px 120px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.04);
    z-index: 10;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    flex-shrink: 0;
  }

  .status-time {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0;
  }

  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-icons svg {
    fill: var(--text-primary);
  }

  /* Top nav */
  .top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px 8px;
    flex-shrink: 0;
  }

  .nav-title {
    font-family: 'Cormorant SC', serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .nav-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 50%;
    background: transparent;
    border: none;
    font-size: 18px;
  }

  /* Progress dots */
  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 4px 0 0;
    flex-shrink: 0;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 3px;
    background: var(--text-dim);
    transition: all 0.4s ease;
  }

  .dot.active {
    width: 20px;
    background: var(--teal);
  }

  .dot.complete {
    background: var(--gold);
  }

  /* Main content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px 24px;
    position: relative;
  }

  /* Eyebrow */
  .eyebrow {
    margin-top: 6px;
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.6s ease;
  }

  .eyebrow.visible {
    opacity: 0.75;
    transform: translateY(0);
  }

  /* Coin stage */
  .coin-stage {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 28px auto 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Reveal ring — clipping mask ring */
  .coin-reveal-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    z-index: 2;
  }

  .coin-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 50%;
    filter: brightness(0.12) saturate(0.15);
  }

  .coin-img.illuminated {
    animation: coinIlluminate 3.8s cubic-bezier(0.12, 0, 0.39, 0) forwards;
  }

  @keyframes coinIlluminate {
    0%   { filter: brightness(0.12) saturate(0.15); }
    15%  { filter: brightness(0.16) saturate(0.2);  }
    30%  { filter: brightness(0.25) saturate(0.32); }
    48%  { filter: brightness(0.42) saturate(0.52); }
    63%  { filter: brightness(0.60) saturate(0.70); }
    76%  { filter: brightness(0.76) saturate(0.84); }
    85%  { filter: brightness(0.86) saturate(0.91); }
    93%  { filter: brightness(0.94) saturate(0.97); }
    100% { filter: brightness(1.0)  saturate(1.0);  }
  }

  /* Inner glow that radiates outward during illumination */
  .coin-inner-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at center,
      rgba(201, 153, 26, 0.55) 0%,
      rgba(201, 153, 26, 0.25) 40%,
      transparent 70%
    );
    z-index: 3;
    opacity: 0;
    mix-blend-mode: screen;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .coin-inner-glow.kindling {
    animation: glowKindle 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .coin-inner-glow.settled {
    opacity: 0;
  }

  @keyframes glowKindle {
    0%   { opacity: 0;    transform: scale(0.6); }
    20%  { opacity: 0.9;  transform: scale(0.85); }
    60%  { opacity: 0.7;  transform: scale(1.05); }
    100% { opacity: 0;    transform: scale(1.2); }
  }

  /* Outer pulse ring */
  .pulse-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1.5px solid rgba(14, 154, 203, 0.0);
    z-index: 1;
    transition: border-color 0.4s ease;
  }

  .pulse-ring.active {
    border-color: rgba(14, 154, 203, 0.35);
    animation: pulseRing 2.4s ease-in-out infinite;
  }

  @keyframes pulseRing {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  /* Gold shimmer ring that appears on unlock */
  .unlock-ring {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 2px solid transparent;
    z-index: 1;
    opacity: 0;
  }

  .unlock-ring.fired {
    animation: unlockRingExpand 1.2s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
  }

  @keyframes unlockRingExpand {
    0% { inset: -8px; border-color: rgba(232, 184, 75, 0.9); opacity: 1; }
    100% { inset: -40px; border-color: rgba(232, 184, 75, 0); opacity: 0; }
  }

  /* Second expansion ring */
  .unlock-ring-2 {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid transparent;
    z-index: 1;
    opacity: 0;
  }

  .unlock-ring-2.fired {
    animation: unlockRingExpand2 1.6s 0.3s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
  }

  @keyframes unlockRingExpand2 {
    0% { inset: -8px; border-color: rgba(14, 154, 203, 0.7); opacity: 1; }
    100% { inset: -55px; border-color: rgba(14, 154, 203, 0); opacity: 0; }
  }

  /* Gold particle burst */
  .particles {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 5;
    pointer-events: none;
    overflow: visible;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    opacity: 0;
    transform: translate(-50%, -50%);
  }

  .particle.gold { background: var(--gold-light); }
  .particle.teal { background: var(--teal); }

  .particle.fired {
    animation: particleFly var(--dur, 1s) var(--delay, 0s) ease-out forwards;
  }

  @keyframes particleFly {
    0% { opacity: 1; transform: translate(-50%, -50%) translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(0.2); }
  }

  /* Coin glow on unlock */
  .coin-glow {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201, 153, 26, 0.4) 0%, transparent 70%);
    z-index: 0;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .coin-glow.visible {
    opacity: 1;
  }

  /* Coin name block */
  .coin-identity {
    text-align: center;
    margin-top: 22px;
    flex-shrink: 0;
  }

  .coin-name {
    font-family: 'Cormorant SC', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.12em;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.7s ease 0.2s;
  }

  .coin-name.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .coin-name.unlocked {
    color: var(--gold-light);
    text-shadow: 0 0 24px rgba(232, 184, 75, 0.4);
    transition: all 0.8s ease;
  }

  .coin-status {
    font-family: 'Cormorant SC', serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.6s ease 0.4s;
  }

  .coin-status.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .coin-status.unlocked {
    color: var(--teal);
    transition: all 0.6s ease;
  }

  /* Inscription */
  .inscription-block {
    margin-top: 20px;
    width: 100%;
    text-align: center;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.8s ease;
    flex-shrink: 0;
  }

  .inscription-block.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .inscription-rule {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 14px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .inscription-rule.visible {
    opacity: 1;
  }

  .inscription-text {
    font-family: 'Cormorant Infant', serif;
    font-size: 17px;
    font-weight: 300;
    font-style: italic;
    color: var(--gold-pale);
    line-height: 1.65;
    letter-spacing: 0.02em;
    padding: 0 8px;
    text-shadow: 0 1px 12px rgba(201, 153, 26, 0.2);
  }

  /* Wisdom card */
  .wisdom-card {
    margin-top: 18px;
    width: 100%;
    background: linear-gradient(135deg, rgba(49, 86, 122, 0.5) 0%, rgba(49, 86, 122, 0.3) 100%);
    border: 1px solid rgba(14, 154, 203, 0.15);
    border-radius: 16px;
    padding: 18px 20px;
    opacity: 0;
    transform: translateY(14px);
    transition: all 0.8s ease;
    flex-shrink: 0;
  }

  .wisdom-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .wisdom-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .wisdom-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(14, 154, 203, 0.12);
    border: 1px solid rgba(14, 154, 203, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wisdom-card-title {
    font-family: 'Cormorant SC', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.1em;
  }

  .wisdom-card-body {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* Quest count mini badges */
  .quest-badges {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 14px;
    flex-shrink: 0;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.6s ease;
  }

  .quest-badges.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .quest-badge {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(201, 153, 26, 0.12);
  }

  .quest-badge svg {
    width: 13px;
    height: 13px;
    fill: var(--gold-light);
  }

  /* CTA Button */
  .cta-area {
    margin-top: auto;
    padding-top: 18px;
    width: 100%;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.6s ease;
    flex-shrink: 0;
  }

  .cta-area.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .cta-btn {
    width: 100%;
    padding: 18px 24px;
    background: linear-gradient(135deg, #C9991A 0%, #E8B84B 50%, #C9991A 100%);
    background-size: 200% 100%;
    border: none;
    border-radius: 14px;
    font-family: 'Cormorant SC', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: #09111B;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: background-position 0.4s ease, transform 0.15s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 24px rgba(201, 153, 26, 0.25);
  }

  .cta-btn:hover {
    background-position: 100% 0;
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(201, 153, 26, 0.4);
  }

  .cta-btn:active {
    transform: translateY(0);
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .cta-btn:hover::before {
    transform: translateX(100%);
  }

  /* ——— Unlock sequence animation states ——— */
  .state-unlocking .pulse-ring {
    animation: none;
    border-color: transparent;
  }

  /* Coin bounce on unlock */
  .coin-bounce {
    animation: coinBounce 0.7s 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
  }

  @keyframes coinBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    20% { transform: translateY(-10px) scale(1.05); }
    40% { transform: translateY(4px) scale(0.98); }
    60% { transform: translateY(-5px) scale(1.02); }
    80% { transform: translateY(2px) scale(0.99); }
  }

  /* Home indicator */
  .home-indicator {
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    margin: 8px auto 12px;
    flex-shrink: 0;
  }

  /* ——— Unlock trigger button (demo) ——— */
  .unlock-trigger {
    position: absolute;
    bottom: 90px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(14, 154, 203, 0.15);
    border: 1px solid rgba(14, 154, 203, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    transition: all 0.2s ease;
    opacity: 0;
  }

  .unlock-trigger:hover {
    background: rgba(14, 154, 203, 0.25);
    transform: scale(1.1);
  }

  /* Text character reveal */
  .char {
    display: inline;
    opacity: 0;
    animation: charReveal 0.04s ease forwards;
    animation-play-state: paused;
  }

  .char.revealed {
    animation-play-state: running;
  }

  @keyframes charReveal {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="coin-glow-bg" id="coinGlowBg"></div>

<div class="star-field" id="starField"></div>

<div class="phone" id="phone">
  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">8:45</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1" opacity="0.4"/><rect x="4.5" y="2" width="3" height="10" rx="1" opacity="0.6"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.5C10.5 2.5 12.7 3.6 14.2 5.3L15.5 3.9C13.6 1.8 11 0.5 8 0.5C5 0.5 2.4 1.8 0.5 3.9L1.8 5.3C3.3 3.6 5.5 2.5 8 2.5Z" opacity="0.4"/><path d="M8 5.5C9.8 5.5 11.4 6.3 12.5 7.5L13.8 6.1C12.3 4.6 10.3 3.5 8 3.5C5.7 3.5 3.7 4.6 2.2 6.1L3.5 7.5C4.6 6.3 6.2 5.5 8 5.5Z" opacity="0.7"/><path d="M8 8.5C9.1 8.5 10.1 9 10.8 9.8L12.1 8.4C10.9 7.2 9.6 6.5 8 6.5C6.4 6.5 5.1 7.2 3.9 8.4L5.2 9.8C5.9 9 6.9 8.5 8 8.5Z"/><circle cx="8" cy="11.5" r="1.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none"/><rect x="22.5" y="4" width="2" height="4" rx="1" fill="rgba(255,255,255,0.4)"/><rect x="1.5" y="2.5" width="16" height="7" rx="2" fill="white"/></svg>
    </div>
  </div>

  <!-- Top nav -->
  <div class="top-nav">
    <button class="nav-btn" style="font-size:20px; color: var(--text-secondary);">×</button>
    <span class="nav-title">5coins page4 coin unlock</span>
    <button class="nav-btn">
      <svg width="18" height="4" viewBox="0 0 18 4" fill="rgba(138,155,176,0.8)">
        <circle cx="2" cy="2" r="2"/><circle cx="9" cy="2" r="2"/><circle cx="16" cy="2" r="2"/>
      </svg>
    </button>
  </div>

  <!-- Progress dots -->
  <div class="progress-dots">
    <div class="dot complete"></div>
    <div class="dot complete"></div>
    <div class="dot complete"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
  </div>

  <!-- Content -->
  <div class="content">

    <div class="eyebrow" id="eyebrow">You've earned this</div>

    <!-- Coin stage -->
    <div class="coin-stage" id="coinStage">
      <div class="coin-glow" id="coinGlow"></div>
      <div class="pulse-ring" id="pulseRing"></div>
      <div class="unlock-ring" id="unlockRing1"></div>
      <div class="unlock-ring-2" id="unlockRing2"></div>
      <div class="coin-reveal-ring">
        <img class="coin-img" id="coinImg" src="placeholder" alt="Creativity Coin">
        <div class="coin-inner-glow" id="coinInnerGlow"></div>
      </div>
      <!-- Particles container -->
      <div class="particles" id="particles"></div>
    </div>

    <!-- Coin identity -->
    <div class="coin-identity">
      <div class="coin-name" id="coinName">Creativity</div>
      <div class="coin-status" id="coinStatus">Quest 4 of 4 — Coin Unlocking</div>
    </div>

    <!-- Quest badges -->
    <div class="quest-badges" id="questBadges">
      <!-- 4 checkmark badges -->
      <div class="quest-badge"><svg viewBox="0 0 13 13"><path d="M2 7L5 10L11 3" stroke="#E8B84B" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="quest-badge"><svg viewBox="0 0 13 13"><path d="M2 7L5 10L11 3" stroke="#E8B84B" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="quest-badge"><svg viewBox="0 0 13 13"><path d="M2 7L5 10L11 3" stroke="#E8B84B" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="quest-badge"><svg viewBox="0 0 13 13"><path d="M2 7L5 10L11 3" stroke="#E8B84B" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <!-- Inscription (hidden until unlock) -->
    <div class="inscription-block" id="inscriptionBlock">
      <div class="inscription-rule" id="inscriptionRule"></div>

// ————— Star field —————
const starField = document.getElementById('starField');
for (let i = 0; i < 80; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  const size = Math.random() * 2 + 0.5;
  star.style.cssText = `
    left: ${Math.random() * 100}%;
    top: ${Math.random() * 100}%;
    width: ${size}px;
    height: ${size}px;
    --dur: ${2 + Math.random() * 4}s;
    --delay: ${Math.random() * 4}s;
    --max-opacity: ${0.15 + Math.random() * 0.35};
  `;
  starField.appendChild(star);
}

// ————— Page entrance sequence —————
let unlockFired = false;

function pageEntrance() {
  // Eyebrow
  setTimeout(() => {
    document.getElementById('eyebrow').classList.add('visible');
  }, 300);

  // Coin name
  setTimeout(() => {
    document.getElementById('coinName').classList.add('visible');
    document.getElementById('coinStatus').classList.add('visible');
  }, 600);

  // Pulse ring
  setTimeout(() => {
    document.getElementById('pulseRing').classList.add('active');
  }, 800);

  // Quest badges
  setTimeout(() => {
    document.getElementById('questBadges').classList.add('visible');
  }, 1000);

  // Auto-trigger unlock after a beat
  setTimeout(() => {
    triggerUnlock();
  }, 2200);
}

// ————— Unlock sequence —————
function triggerUnlock() {
  if (unlockFired) return;
  unlockFired = true;

  const phone = document.getElementById('phone');
  const coinMask = document.getElementById('coinMask');
  const coinStage = document.getElementById('coinStage');
  const pulseRing = document.getElementById('pulseRing');

  // Stop pulse ring immediately
  pulseRing.classList.remove('active');
  pulseRing.style.borderColor = 'transparent';

  // Step 1: Inner glow kindles — like a flame catching (immediate)
  const innerGlow = document.getElementById('coinInnerGlow');
  innerGlow.classList.add('kindling');

  // Step 2: Brightness bleeds in slowly alongside the glow
  setTimeout(() => {
    document.getElementById('coinImg').classList.add('illuminated');
  }, 80);

  // Step 3: Teal pulse ring breathes in softly after the glow has settled
  setTimeout(() => {
    pulseRing.style.borderColor = '';
    pulseRing.classList.add('active');
  }, 1800);



  // Expansion rings — after coin is mostly lit
  setTimeout(() => {
    document.getElementById('unlockRing1').classList.add('fired');
    document.getElementById('unlockRing2').classList.add('fired');
  }, 2400);

  // Particles — same beat
  setTimeout(() => {
    fireParticles();
  }, 2350);

  // Coin glow
  setTimeout(() => {
    document.getElementById('coinGlow').classList.add('visible');
    document.getElementById('coinGlowBg').classList.add('visible');
  }, 500);

  // Coin name goes gold
  setTimeout(() => {
    document.getElementById('coinName').classList.add('unlocked');
    document.getElementById('coinStatus').classList.add('unlocked');
    document.getElementById('coinStatus').textContent = 'Coin Unlocked — Wisdom Earned';
  }, 800);

  // Inscription appear
  setTimeout(() => {
    document.getElementById('inscriptionBlock').classList.add('visible');
    document.getElementById('inscriptionRule').classList.add('visible');
    typeInscription();
  }, 1400);

  // Wisdom card
  setTimeout(() => {
    document.getElementById('wisdomCard').classList.add('visible');
  }, 2400);

  // CTA
  setTimeout(() => {
    document.getElementById('ctaArea').classList.add('visible');
  }, 3000);
}

// ————— Typewriter inscription —————
function typeInscription() {
  const text = 'Creativity shifts the pieces we choose —\nAnd wisdom knows which to use.';
  const el = document.getElementById('inscriptionText');
  el.innerHTML = '';
  let i = 0;
  const interval = setInterval(() => {
    if (i >= text.length) { clearInterval(interval); return; }
    const char = text[i];
    if (char === '\n') {
      el.innerHTML += '<br>';
    } else {
      const span = document.createElement('span');
      span.textContent = char;
      span.style.opacity = '0';
      span.style.animation = 'charReveal 0.04s ease forwards';
      el.appendChild(span);
      // force reflow then reveal
      span.getBoundingClientRect();
      span.style.opacity = '1';
    }
    i++;
  }, 38);
}

// ————— Particle burst —————
function fireParticles() {
  const container = document.getElementById('particles');
  const count = 18;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * 360 + (Math.random() * 20 - 10);
    const dist = 70 + Math.random() * 60;
    const rad = angle * Math.PI / 180;
    const tx = Math.cos(rad) * dist;
    const ty = Math.sin(rad) * dist;
    const isGold = Math.random() > 0.3;

    const p = document.createElement('div');
    p.className = `particle ${isGold ? 'gold' : 'teal'} fired`;
    const size = 2 + Math.random() * 4;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      --tx: ${tx}px;
      --ty: ${ty}px;
      --dur: ${0.7 + Math.random() * 0.6}s;
      --delay: ${Math.random() * 0.2}s;
    `;
    container.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

function handleCTA() {
  window.location.href = '5coins_page1.html';
}

// ————— Boot —————
window.addEventListener('load', () => {
  setTimeout(pageEntrance, 400);
});
